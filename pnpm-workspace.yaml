# pnpm 10 reads its settings from THIS file (it takes precedence over
# package.json's "pnpm" field, and over .npmrc for pnpm-specific keys at
# script-run time).
#
# onlyBuiltDependencies: explicitly ALLOW the native packages that need a
# build step. (It previously held `ignoredBuiltDependencies`, which told
# pnpm to SKIP them, so a fresh clone failed.)
onlyBuiltDependencies:
  - esbuild
  - msw
  - protobufjs
  - sharp
  - unrs-resolver
#
# verifyDepsBeforeRun: false — do NOT run pnpm's pre-script dependency
# re-check before `pnpm seed` / `pnpm dev`. That check spawns a sync
# `pnpm install` whose only failure mode here is the ignored-build-scripts
# warning being escalated to a hard error (exit 1). Disabling it means the
# scripts run regardless, which is correct: esbuild's binary ships as an
# optional dependency and sharp is optional for `next dev`, so the app
# works even if those post-install scripts are skipped. This is the
# canonical pnpm-10 location for the setting (mirrors .npmrc as a
# safety net for any environment where one source isn't honored).
verifyDepsBeforeRun: false
