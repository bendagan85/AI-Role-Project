# pnpm 10.33 settings. pnpm reads this file (it takes precedence over
# package.json's "pnpm" field and over .npmrc for pnpm-specific keys).

# allowBuilds — THE mechanism pnpm 10.33 uses to approve dependency build
# scripts. If a package isn't explicitly `true` here, pnpm refuses to run
# its install script and (on a fresh clone) auto-injects placeholder
# entries, leaving the build "ignored" and failing `pnpm seed`/`pnpm dev`.
# Setting these true makes a fresh clone build them deterministically with
# no prompt — this is the actual plug-and-play fix.
allowBuilds:
  esbuild: true
  msw: true
  protobufjs: true
  sharp: true
  unrs-resolver: true

# onlyBuiltDependencies — same intent in the older array form, kept for
# pnpm 9 / other versions that read this instead of allowBuilds.
onlyBuiltDependencies:
  - esbuild
  - msw
  - protobufjs
  - sharp
  - unrs-resolver

# verifyDepsBeforeRun: false — belt-and-suspenders: never run the
# pre-script dependency re-check that escalated the ignored-build warning
# to a hard exit 1. Mirrored in .npmrc.
verifyDepsBeforeRun: false
