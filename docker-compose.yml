# Optional local infrastructure for offline development.
#
# The recommended setup is a hosted Supabase free-tier project (see README
# "Local Development → Hosted Supabase") — that is also the path the live
# deployment uses. This compose file is a convenience for the infra layer
# only:
#
#   - postgres: Postgres 16 with the pgvector extension preinstalled, for
#               poking at the vector/RAG SQL locally.
#   - inngest:  the Inngest dev server (durable background jobs for ingestion).
#
# IMPORTANT — what this is NOT: it is not the full Supabase stack. The app's
# migrations intentionally reference Supabase's `auth.users` (RLS uses
# `auth.uid()`), which only exists inside Supabase, so they are NOT
# auto-applied here — running them against vanilla Postgres would fail. Auth
# and Storage always point at a hosted Supabase project. Running the entire
# Supabase stack locally is a deliberate out-of-scope trade-off (README).
#
# Use: `docker compose up` to get pgvector + the Inngest dev server, then run
# the app with `pnpm dev` pointed at a hosted Supabase in .env.local.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-coach-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_coach
    ports:
      - '5432:5432'
    volumes:
      - ai_coach_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ai_coach']
      interval: 5s
      timeout: 5s
      retries: 10

  inngest:
    image: inngest/inngest:latest
    container_name: ai-coach-inngest
    command: ['inngest', 'dev', '-u', 'http://host.docker.internal:3000/api/inngest']
    ports:
      - '8288:8288'
    extra_hosts:
      - 'host.docker.internal:host-gateway'

volumes:
  ai_coach_pgdata:
